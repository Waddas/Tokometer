# Task runner for Tokometer — https://taskfile.dev
# `task` uses a built-in POSIX-sh interpreter on every OS, so these run the
# same on macOS, Windows, and Linux (see cross-platform constraint).
version: "3"

vars:
  CARGO_MANIFEST: src-tauri/Cargo.toml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install frontend dependencies
    cmds:
      - npm install

  dev:
    desc: Run the full Tauri app (Rust + webview) in dev mode
    cmds:
      - npm run tauri dev

  dev:web:
    desc: Run only the Vite frontend dev server
    cmds:
      - npm run dev

  run:release:
    desc: Build and launch the production app for the current platform
    cmds:
      # macOS must launch the bundled .app — the raw binary can't serve the
      # webview's embedded asset protocol, so it renders blank.
      - cmd: npm run tauri build -- --bundles app
        platforms: [darwin]
      - cmd: open "src-tauri/target/release/bundle/macos/Tokometer.app"
        platforms: [darwin]
      # Windows/Linux load the embedded assets fine from the raw binary.
      - cmd: npm run tauri build -- --no-bundle
        platforms: [windows, linux]
      - cmd: cmd /c start "" "src-tauri\target\release\tokometer.exe"
        platforms: [windows]
      - cmd: ./src-tauri/target/release/tokometer
        platforms: [linux]

  build:
    desc: Build the production Tauri bundle for the current platform
    cmds:
      - npm run tauri build

  build:web:
    desc: Type-check and build the frontend assets only
    cmds:
      - npm run build

  # Graduation must never go through the GitHub UI: the repo is squash-only
  # and main requires linear history, so a UI merge would collapse the whole
  # beta cycle into one commit and release-please would lose the per-PR
  # changelog entries and version bumps. Pushing the merge commit relies on
  # the main ruleset's admin bypass — for anyone else the push is rejected.
  graduate:
    desc: Graduate the beta channel — merge beta into main with a merge commit (repo admin only)
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: Working tree must be clean.
    cmds:
      - git fetch origin
      - git checkout main
      - git merge --ff-only origin/main
      - 'git merge --no-ff origin/beta -m "chore: graduate beta to main"'
      - git push origin main
      - cmd: echo "Graduated. Merge the release PR release-please opens, then run task sync-beta."
        silent: true

  sync-beta:
    desc: After a stable release — merge main back into beta and reset the beta manifest
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: Working tree must be clean.
    cmds:
      - git fetch origin
      - git checkout beta
      - git merge --ff-only origin/beta
      - 'git merge --no-ff origin/main -m "chore: sync beta with main after stable release"'
      - node -e "const fs=require('fs'); const v=JSON.parse(fs.readFileSync('.release-please-manifest.json','utf8'))['.']; const p='.release-please-manifest-beta.json'; const m=JSON.parse(fs.readFileSync(p,'utf8')); m['.']=v; fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n'); console.log('beta manifest set to '+v)"
      - git add .release-please-manifest-beta.json
      - 'git diff --cached --quiet || git commit -m "chore: reset beta manifest to current stable"'
      - git push origin beta

  test:
    desc: Run the whole test suite (frontend + Rust)
    deps:
      - test:web
      - test:rust

  test:web:
    desc: Run the frontend (Vitest) unit tests
    cmds:
      - npm run test

  test:watch:
    desc: Run the frontend tests in watch mode
    cmds:
      - npm run test:watch

  test:rust:
    desc: Run the Rust (cargo) unit tests
    cmds:
      - cargo test --manifest-path {{.CARGO_MANIFEST}}

  test:e2e:
    desc: Build a debug app and drive it end-to-end over CDP (Windows only)
    cmds:
      - npm run tauri build -- --debug --no-bundle --config src-tauri/tauri.e2e.conf.json
      - npm run test:e2e

  typecheck:
    desc: Type-check the frontend without emitting output
    cmds:
      - npx tsc --noEmit

  fmt:
    desc: Format the Rust source
    cmds:
      - cargo fmt --manifest-path {{.CARGO_MANIFEST}}

  lint:
    desc: Lint the Rust source with Clippy
    cmds:
      - cargo clippy --manifest-path {{.CARGO_MANIFEST}} -- -D warnings

  check:
    desc: Type-check, lint, and run every test
    deps:
      - typecheck
      - lint
      - test

  clean:
    desc: Remove build artifacts (dist + Rust target)
    cmds:
      - cargo clean --manifest-path {{.CARGO_MANIFEST}}
      - cmd: rm -rf dist
        platforms: [linux, darwin]
      - cmd: if exist dist rmdir /s /q dist
        platforms: [windows]
