<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tokometer logo">
  <title>Tokometer</title>
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#30302d"/>
      <stop offset="0.6" stop-color="#222220"/>
      <stop offset="1" stop-color="#191918"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.62">
      <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="sheen" x1="256" y1="40" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="120" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8da471"/>
      <stop offset="1" stop-color="#67794d"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="120" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ec8a66"/>
      <stop offset="1" stop-color="#c66440"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="120" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cf4a3a"/>
      <stop offset="1" stop-color="#a52c22"/>
    </linearGradient>
    <linearGradient id="needle" x1="228.15" y1="289.5" x2="364.13" y2="194.29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b85638"/>
      <stop offset="1" stop-color="#ef9070"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.38" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f4f2ec"/>
      <stop offset="1" stop-color="#c9c7be"/>
    </radialGradient>
    <radialGradient id="bezel" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#3a3a36"/>
      <stop offset="1" stop-color="#161615"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- App-icon background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#vignette)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Unlit gauge track -->
  <path d="M 149.93 376.07 A 150 150 0 1 1 362.07 376.07" fill="none" stroke="#2f2f2b" stroke-width="34" stroke-linecap="round"/>

  <!-- Live illumination glow on the amber (active) zone -->
  <path d="M 342.04 147.13 A 150 150 0 0 1 406 270" fill="none" stroke="#f0915f" stroke-opacity="0.55" stroke-width="34" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Coloured usage arc -->
  <g fill="none" stroke-width="34" stroke-linecap="round">
    <path d="M 149.93 376.07 A 150 150 0 0 1 342.04 147.13" stroke="url(#green)"/>
    <path d="M 342.04 147.13 A 150 150 0 0 1 406 270" stroke="url(#amber)"/>
    <path d="M 406 270 A 150 150 0 0 1 362.07 376.07" stroke="url(#red)"/>
  </g>

  <!-- Inner sheen on the band -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3" stroke-linecap="round">
    <path d="M 134.49 375.63 A 161 161 0 1 1 377.51 375.63"/>
  </g>

  <!-- Graduations -->
  <g stroke="#faf9f5" stroke-opacity="0.30" stroke-width="2.4" stroke-linecap="round">
    <line x1="119.17" y1="349" x2="112.24" y2="353"/>
    <line x1="103.38" y1="310.89" x2="95.66" y2="312.96"/>
    <line x1="103.38" y1="229.11" x2="95.66" y2="227.04"/>
    <line x1="119.17" y1="191" x2="112.24" y2="187"/>
    <line x1="177" y1="133.17" x2="173" y2="126.24"/>
    <line x1="215.11" y1="117.38" x2="213.04" y2="109.66"/>
    <line x1="296.89" y1="117.38" x2="298.96" y2="109.66"/>
    <line x1="335" y1="133.17" x2="339" y2="126.24"/>
    <line x1="392.83" y1="191" x2="399.76" y2="187"/>
    <line x1="408.62" y1="229.11" x2="416.34" y2="227.04"/>
    <line x1="408.62" y1="310.89" x2="416.34" y2="312.96"/>
    <line x1="392.83" y1="349" x2="399.76" y2="353"/>
  </g>
  <g stroke="#faf9f5" stroke-opacity="0.62" stroke-width="4" stroke-linecap="round">
    <line x1="161.25" y1="364.75" x2="138.62" y2="387.38"/>
    <line x1="122" y1="270" x2="90" y2="270"/>
    <line x1="161.25" y1="175.25" x2="138.62" y2="152.62"/>
    <line x1="256" y1="136" x2="256" y2="104"/>
    <line x1="350.75" y1="175.25" x2="373.38" y2="152.62"/>
    <line x1="390" y1="270" x2="422" y2="270"/>
    <line x1="350.75" y1="364.75" x2="373.38" y2="387.38"/>
  </g>

  <!-- Needle -->
  <g filter="url(#softShadow)">
    <polygon points="364.13,194.29 260.59,276.55 228.15,289.5 251.41,263.45" fill="url(#needle)"/>
  </g>

  <!-- Hub -->
  <g filter="url(#softShadow)">
    <circle cx="256" cy="270" r="25" fill="url(#bezel)"/>
    <circle cx="256" cy="270" r="19" fill="url(#hub)"/>
    <circle cx="256" cy="270" r="6" fill="#b85638"/>
  </g>
</svg>
