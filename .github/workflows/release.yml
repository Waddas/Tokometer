name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # manual run = build-only smoke test (creates no release)

permissions:
  contents: write
  pull-requests: write

jobs:
  # release-please reads conventional commits on main and maintains a standing
  # "chore: release X.Y.Z" PR. Merging that PR bumps the version, updates
  # CHANGELOG.md, and creates the git tag + GitHub release. The build job below
  # then attaches the installers to that release.
  #
  # Both jobs live in one workflow on purpose: a tag created via the default
  # GITHUB_TOKEN does NOT trigger a separate tag-listening workflow, so a
  # standalone build workflow would never fire. Job-level `needs` has no such
  # restriction, so no Personal Access Token is required.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    # Build when release-please cut a release, or on a manual smoke-test run.
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal binary (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04 # oldest supported -> widest glibc compatibility
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev \
            libxdo-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and generates latest.json. Without these
          # the build still succeeds but ships no auto-update manifest.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a release run: upload installers to the release-please release.
          # On manual dispatch: tag_name is empty -> tauri-action only builds.
          tagName: ${{ needs.release-please.outputs.tag_name }}
          args: ${{ matrix.args }}
