name: Release

on:
  push:
    branches: [main, beta]
  workflow_dispatch: # manual run = build-only smoke test (creates no release)

permissions:
  contents: write
  pull-requests: write

jobs:
  # release-please reads conventional commits on the triggering branch and
  # maintains a standing release PR against it. main is the stable channel;
  # beta is the pre-release channel, cutting X.Y.Z-beta.N versions published
  # as GitHub prereleases. Each channel has its own config + manifest pair
  # (distinct filenames, so merging beta into main can't clobber stable
  # state). Merging the release PR bumps the version, updates CHANGELOG.md,
  # and creates the git tag + GitHub release. The build job below then
  # attaches the installers to that release.
  #
  # Both jobs live in one workflow on purpose: a tag created via the default
  # GITHUB_TOKEN does NOT trigger a separate tag-listening workflow, so a
  # standalone build workflow would never fire. Job-level `needs` has no such
  # restriction, so no Personal Access Token is required.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'beta' && 'release-please-config-beta.json' || 'release-please-config.json' }}
          manifest-file: ${{ github.ref_name == 'beta' && '.release-please-manifest-beta.json' || '.release-please-manifest.json' }}

  build:
    needs: release-please
    # Build when release-please cut a release, or on a manual smoke-test run.
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        # beta-bundles narrows the bundle set on beta builds: WiX (msi) and
        # rpm both reject pre-release identifiers like 1.2.0-beta.1, so the
        # beta channel ships nsis on Windows and deb/AppImage on Linux.
        include:
          - platform: macos-latest # universal binary (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            beta-bundles: ""
          - platform: ubuntu-22.04 # oldest supported -> widest glibc compatibility
            args: ""
            rust-targets: ""
            beta-bundles: "--bundles deb,appimage"
          - platform: windows-latest
            args: ""
            rust-targets: ""
            beta-bundles: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev \
            libxdo-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and generates latest.json. Without these
          # the build still succeeds but ships no auto-update manifest.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a release run: upload installers to the release-please release.
          # On manual dispatch: tag_name is empty -> tauri-action only builds.
          tagName: ${{ needs.release-please.outputs.tag_name }}
          args: ${{ matrix.args }} ${{ github.ref_name == 'beta' && matrix.beta-bundles || '' }}

  # GitHub's /releases/latest URL (the stable updater endpoint) never resolves
  # to prereleases, so the beta channel needs its own fixed URL. This job
  # copies the release's latest.json onto a rolling "updater-beta" release:
  #   https://github.com/Waddas/Tokometer/releases/download/updater-beta/latest.json
  # The in-app beta opt-in points the updater there. It runs for stable
  # releases too, so beta users graduate to the next stable when a beta cycle
  # ends. (A stable cut while betas are ahead briefly points the manifest at
  # the older version — harmless, since the updater never downgrades.)
  beta-updater-manifest:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy latest.json to the updater-beta rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern latest.json
          if ! gh release view updater-beta --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create updater-beta --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "Beta updater manifest" \
              --notes "Rolling release holding latest.json for the in-app beta update channel. Managed by CI — do not edit or delete."
          fi
          gh release upload updater-beta latest.json --clobber --repo "$GITHUB_REPOSITORY"
