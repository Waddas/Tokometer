name: PR Title

# With squash merging configured to use the PR title as the commit subject,
# the PR title becomes the commit release-please reads. So we validate the
# title against the Conventional Commits spec; individual branch commits are
# squashed away and don't need to follow the convention.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types release-please understands. feat -> minor, fix -> patch,
          # and a "!" or BREAKING CHANGE footer -> major.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
