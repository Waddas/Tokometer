<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clordgauge</title>
  </head>
  <body class="layout-mascot-left">
    <div id="root">
      <div id="scaler">
        <div id="mascot-chip">
          <canvas id="mascot" width="480" height="480"></canvas>
        </div>
        <section class="panel" data-window="session">
          <div class="pct">--%</div>
          <div class="reset">---</div>
        </section>
        <section class="panel" data-window="weekly">
          <div class="pct">--%</div>
          <div class="reset">---</div>
        </section>
      </div>
      <div id="controls">
        <button id="btn-pin" title="Pin on top">&#9737;</button>
        <button id="btn-refresh" title="Refresh now">&#8635;</button>
        <button id="btn-hide" title="Hide (restore from tray)">&#215;</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
